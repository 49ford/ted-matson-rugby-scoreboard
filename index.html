<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ted Matson Rugby Scoreboard</title>

  <style>
    :root{
      --bg: #0a1f33;
      --panel: #102a44;
      --card: #163a5f;
      --accent: #c9a24d;   /* gold */
      --danger: #8b1e2d;   /* maroon */
      --text: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --outline: rgba(255,255,255,0.14);

      /* outcome colours */
      --win: #2bb673;      /* green */
      --draw: #c9a24d;     /* gold */
      --loss: #8b1e2d;     /* maroon */
      --tbc: rgba(255,255,255,0.35);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      background: var(--panel);
      padding: 18px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--outline);
    }

    header img {
      height: 70px;
      width: auto;
      border-radius: 12px;
      background: #ffffff;
      padding: 6px;
    }

    header .title {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
    }

    /* LIVE badge */
    .liveBadge {
      display: none;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(43, 182, 115, 0.18);
      color: #bff3db;
      text-transform: uppercase;
    }
    .liveBadge.on { display: inline-flex; }
    .liveBadge.pulse {
      animation: pulse 0.9s ease-in-out infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.06); filter: brightness(1.2); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    .topbar {
      margin: 18px auto 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 10px;
      align-items: center;
    }

    select, .smallbtn {
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--outline);
      outline: none;
      background: rgba(255,255,255,0.06);
      color: white;
    }

    select { min-width: 240px; }

    .smallbtn {
      cursor: pointer;
      font-weight: 600;
    }

    .smallbtn.danger {
      background: rgba(139, 30, 45, 0.95);
      border-color: rgba(255,255,255,0.12);
    }

    /* Timer UI */
    .timerWrap{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid var(--outline);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
    }
    .timerDisplay{
      font-weight: 900;
      letter-spacing: 1px;
      font-size: 18px;
      min-width: 92px;
      text-align: center;
    }
    .timerPeriod{
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      background: rgba(255,255,255,0.08);
    }
    .timerBtn{
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      font-weight: 800;
    }
    .timerBtn.primary{
      background: rgba(201,162,77,0.20);
      border-color: rgba(201,162,77,0.35);
      color: #ffe6ad;
    }
    .timerBtn.danger{
      background: rgba(139,30,45,0.22);
      border-color: rgba(139,30,45,0.35);
      color: #ffd1d8;
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 26px;
      margin: 26px auto 0;
      padding: 0 10px 10px;
      flex-wrap: wrap;
      max-width: 1060px;
    }

    .team {
      background: var(--card);
      padding: 22px;
      border-radius: 14px;
      width: 330px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      border: 1px solid var(--outline);
    }

    .label {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.85;
      margin-top: 6px;
    }

    .teamname {
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .teamname input {
      font-size: 18px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--outline);
      width: 210px;
      text-align: center;
      background: rgba(255,255,255,0.10);
      color: white;
    }

    .score {
      font-size: 86px;
      margin: 14px 0 18px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .btnrow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      font-size: 18px;
      padding: 12px 10px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    .add { background: var(--accent); color: #0a1f33; }
    .subtract { background: var(--danger); color: white; }

    /* Logo badge */
    .logoBadge{
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .logoBadge img{
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }
    .initials{
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.8px;
      color: white;
    }

    /* Results section */
    .section {
      max-width: 1060px;
      margin: 22px auto 40px;
      padding: 0 10px;
      text-align: left;
    }

    .sectionHeader {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .section h2{
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.3px;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      margin-top: 6px;
    }

    .resultsGrid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 12px;
    }

    .resultCard{
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--outline);
      border-radius: 14px;
      padding: 14px;
      position: relative;
    }

    /* subtle divider line */
    .divider{
      height: 1px;
      background: var(--outline);
      margin: 10px 0;
    }

    /* Outcome border accent */
    .resultCard.win  { border-left: 6px solid var(--win); }
    .resultCard.loss { border-left: 6px solid var(--loss); }
    .resultCard.draw { border-left: 6px solid var(--draw); box-shadow: 0 0 0 2px rgba(201,162,77,0.22); }
    .resultCard.tbc  { border-left: 6px solid var(--tbc); }

    .meta{
      color: var(--muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Round badge -> R3 */
    .roundBadge {
      display: inline-block;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.16);
      color: white;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0.7px;
      padding: 4px 10px;
      border-radius: 999px;
      text-transform: uppercase;
    }

    /* Win/Loss badge */
    .outcomeBadge{
      display: inline-block;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0.7px;
      padding: 4px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.10);
    }
    .outcomeBadge.win  { background: rgba(43, 182, 115, 0.18); color: #bff3db; border-color: rgba(43,182,115,0.35); }
    .outcomeBadge.loss { background: rgba(139, 30, 45, 0.22); color: #ffd1d8; border-color: rgba(139,30,45,0.45); }
    .outcomeBadge.draw { background: rgba(201, 162, 77, 0.20); color: #ffe6ad; border-color: rgba(201,162,77,0.50); }
    .outcomeBadge.tbc  { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.80); border-color: rgba(255,255,255,0.18); }

    .metaExtra{
      opacity: 0.85;
      font-style: italic;
    }

    .matchRow{
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
    }

    .teamSide{
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .teamSide.right{
      justify-content: flex-end;
      text-align: right;
    }

    .teamText{
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
    }

    .scorePill{
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      letter-spacing: 0.6px;
      min-width: 106px;
      text-align: center;
      display: inline-flex;
      justify-content: center;
      gap: 10px;
      align-items: baseline;
    }

    .scorePart{
      opacity: 0.95;
      font-weight: 800;
    }

    /* Highlight Geelong’s score in each result card */
    .scorePart.gg{
      color: white;
      font-weight: 1000;
      text-shadow: 0 0 10px rgba(255,255,255,0.25);
      opacity: 1;
    }

    .dash{
      opacity: 0.75;
      font-weight: 900;
    }

    .footer {
      margin: 10px 0 30px;
      font-size: 13px;
      opacity: 0.75;
      text-align: center;
    }

    /* Fixture pickers: hidden until relevant division is selected */
    #gamePicker1st, #gamePicker2nd, #gamePickerU16 { display: none; }
  </style>
</head>

<body>

  <header>
    <img src="logo.png" alt="Ted Matson Club logo" />
    <div class="title">
      <h1>
        🏉 Ted Matson Rugby Scoreboard
        <span id="liveBadge" class="liveBadge">LIVE</span>
      </h1>
      <div class="sub">Multi-Division: 1st XV • 2nd XV • U16</div>
    </div>
  </header>

  <!-- CONTROLS -->
  <div class="topbar">
    <select id="divisionSelect" aria-label="Select division">
      <option>1st XV</option>
      <option>2nd XV</option>
      <option>U16</option>
    </select>

    <select id="gamePicker1st" aria-label="Select 1st XV fixture"></select>
    <select id="gamePicker2nd" aria-label="Select 2nd XV fixture"></select>
    <select id="gamePickerU16" aria-label="Select U16 fixture"></select>

    <div class="timerWrap" aria-label="Match timer">
      <span id="timerPeriod" class="timerPeriod">H1</span>
      <span id="timerDisplay" class="timerDisplay">00:00</span>
      <button class="timerBtn primary" id="timerStartBtn" type="button">Start</button>
      <button class="timerBtn danger" id="timerResetBtn" type="button">Reset</button>
    </div>

    <button class="smallbtn" onclick="resetCurrentDivision()">Reset this division</button>
    <button class="smallbtn danger" onclick="resetEverything()">Reset ALL divisions</button>
  </div>

  <div class="scoreboard">
    <!-- HOME TEAM -->
    <div class="team">
      <div class="label">Home</div>
      <div class="teamname">
        <span id="homeLogoBadge" class="logoBadge"></span>
        <input id="homeName" type="text" value="Geelong" />
      </div>

      <div id="homeScore" class="score">0</div>

      <div class="btnrow">
        <button class="add" onclick="addPoints('home', 5)">+5 Try</button>
        <button class="add" onclick="addPoints('home', 2)">+2 Conversion</button>
        <button class="add" onclick="addPoints('home', 3)">+3 Penalty</button>
        <button class="add" onclick="addPoints('home', 3)">+3 Drop Goal</button>
        <button class="subtract" onclick="addPoints('home', -1)">-1</button>
        <button class="subtract" onclick="addPoints('home', -5)">-5</button>
      </div>
    </div>

    <!-- AWAY TEAM -->
    <div class="team">
      <div class="label">Away</div>
      <div class="teamname">
        <span id="awayLogoBadge" class="logoBadge"></span>
        <input id="awayName" type="text" value="Opposition" />
      </div>

      <div id="awayScore" class="score">0</div>

      <div class="btnrow">
        <button class="add" onclick="addPoints('away', 5)">+5 Try</button>
        <button class="add" onclick="addPoints('away', 2)">+2 Conversion</button>
        <button class="add" onclick="addPoints('away', 3)">+3 Penalty</button>
        <button class="add" onclick="addPoints('away', 3)">+3 Drop Goal</button>
        <button class="subtract" onclick="addPoints('away', -1)">-1</button>
        <button class="subtract" onclick="addPoints('away', -5)">-5</button>
      </div>
    </div>
  </div>

  <!-- RESULTS (SWITCHES BY DIVISION) -->
  <div class="section">
    <div class="sectionHeader">
      <div>
        <h2 id="resultsTitle">1st XV — Previous Games (This Season)</h2>
        <div id="resultsNote" class="note">2026 VSRU — 1st XV Results</div>
      </div>
    </div>
    <div id="resultsGrid" class="resultsGrid" aria-live="polite"></div>
  </div>

  <div class="footer">
    Built for match day • Scores + names save automatically per division
  </div>

  <script>
    // =========================
    // LOGOS (FILES IN SAME FOLDER AS scoreboard.html)
    // =========================

    function normalizeTeamName(name){
      return (name || "")
        .toLowerCase()
        .replace(/\b1st\s*xv\b/g, "")
        .replace(/\b2nd\s*xv\b/g, "")
        .replace(/\bxv\b/g, "")
        .replace(/[^a-z0-9 ]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    const normalizedLogoMap = (() => {
      const map = {};
      for (const [key, val] of Object.entries(teamLogoMap)){
        map[normalizeTeamName(key)] = val;
      }
      return map;
    })();

    function initialsFor(teamName){
      return (teamName || "")
        .replace(/[^A-Za-z0-9 ]/g, "")
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .slice(0,3)
        .map(w => w[0].toUpperCase())
        .join("");
    }

    function logoSrcFor(teamName){
      return normalizedLogoMap[normalizeTeamName(teamName)] || "";
    }

    function setLogoBadge(badgeEl, teamName){
      const src = logoSrcFor(teamName);
      badgeEl.innerHTML = src
        ? `<img src="${src}" alt="${teamName} logo">`
        : `<span class="initials">${initialsFor(teamName)}</span>`;
    }

    // =========================

    ];

    const secondXVGames = [
      { id: "2026-06-13-1000", label: "Sat, Jun 13, 2026 — vs Scotch College (Home)", home: "Geelong Grammar 2nd XV", away: "Scotch College 2nd XV", venue: "Geelong Grammar School" },
      { id: "2026-06-20-1000", label: "Sat, Jun 20, 2026 — at Melbourne High (Away)", home: "Melbourne High School 2nd XV", away: "Geelong Grammar 2nd XV", venue: "Fawkner Park" },
      { id: "2026-07-25-1000", label: "Sat, Jul 25, 2026 — vs Melbourne Grammar (Home)", home: "Geelong Grammar 2nd XV", away: "Melbourne Grammar 2nd XV", venue: "Geelong Grammar School" },
      { id: "2026-08-01-1000", label: "Sat, Aug 1, 2026 — vs St Kevin's GOLD (Home)", home: "Geelong Grammar 2nd XV", away: "St Kevin's College GOLD 2nd XV", venue: "Geelong Grammar School" }
    ];

    const u16Games = [
      { id: "2026-06-13-0900", label: "Sat, Jun 13, 2026 — vs Scotch College (Home)", home: "Geelong Grammar U16", away: "Scotch College U16", venue: "Geelong Grammar School" }
    ];

    // =========================
    // RESULTS (HARD CODED)
    // =========================
    const manualPast1stXV = [
      { date: "2026-05-23", dateLabel: "Sat, May 23, 2026, 10:30 AM", venue: "Geelong Grammar School", home: "Geelong Grammar 1st XV", away: "Melbourne Grammar 1st XV", homeScore: 0, awayScore: 47, note: "Round 4" },

      { date: "2026-05-09", dateLabel: "Sat, May 9, 2026, 11:30 AM", venue: "Xavier College - Wakefield Oval", home: "Xavier College 1st XV", away: "Geelong Grammar 1st XV", homeScore: 17, awayScore: 10, note: "Round 2" },
      { date: "2026-05-02", dateLabel: "Sat, May 2, 2026, 11:30 AM", venue: "Geelong Grammar School", home: "Geelong Grammar 1st XV", away: "Haileybury College 1st XV", homeScore: 5, awayScore: 50, note: "Round 1" }
    ];

    const manualPastU16 = [
      { date: "2026-05-30", dateLabel: "Sat, May 30, 2026, 9:00 AM", venue: "St Kevin's College, Toorak", home: "St Kevin's College U16", away: "Geelong Grammar U16", homeScore: 50, awayScore: 14, note: "Round 5" },

    const manualPast2ndXV = [
      { date: "2026-05-23", dateLabel: "Sat, May 23, 2026, 10:00 AM", venue: "Geelong Grammar School", home: "Geelong Grammar 2nd XV", away: "St Kevin's College GREEN 2nd XV", homeScore: null, awayScore: null, note: "Round 4 (score not shown)" },
      { date: "2026-05-16", dateLabel: "Sat, May 16, 2026, 10:00 AM", venue: "Brighton Grammar School", home: "Brighton Grammar 2nd XV", away: "Geelong Grammar 2nd XV", homeScore: 26, awayScore: 12, note: "Round 3" },
      { date: "2026-05-09", dateLabel: "Sat, May 9, 2026, 10:00 AM", venue: "Xavier College - Wakefield Oval", home: "Xavier College 2nd XV", away: "Geelong Grammar 2nd XV", homeScore: 0, awayScore: 30, note: "Round 2" },
      { date: "2026-05-02", dateLabel: "Sat, May 2, 2026, 10:00 AM", venue: "Geelong Grammar School", home: "Geelong Grammar 2nd XV", away: "St Patrick's College 2nd XV", homeScore: 21, awayScore: 5, note: "Round 1" }
    ];

    // =========================
    // DOM HOOKS
    // =========================
    const divisionSelect = document.getElementById("divisionSelect");
    const gamePicker1st = document.getElementById("gamePicker1st");
    const gamePicker2nd = document.getElementById("gamePicker2nd");
    const gamePickerU16 = document.getElementById("gamePickerU16");

    const homeScoreEl = document.getElementById("homeScore");
    const awayScoreEl = document.getElementById("awayScore");
    const homeNameEl = document.getElementById("homeName");
    const awayNameEl = document.getElementById("awayName");
    const homeLogoBadge = document.getElementById("homeLogoBadge");
    const awayLogoBadge = document.getElementById("awayLogoBadge");

    const resultsGridEl = document.getElementById("resultsGrid");
    const resultsTitleEl = document.getElementById("resultsTitle");
    const resultsNoteEl  = document.getElementById("resultsNote");

    const liveBadgeEl = document.getElementById("liveBadge");

    const timerDisplayEl = document.getElementById("timerDisplay");
    const timerPeriodEl  = document.getElementById("timerPeriod");
    const timerStartBtn  = document.getElementById("timerStartBtn");
    const timerResetBtn  = document.getElementById("timerResetBtn");

    // =========================
    // STATE + STORAGE
    // =========================
    const STORAGE_KEY = "ted_matson_scoreboard_state_v11";

    const defaultState = {
      "1st XV": { home: 0, away: 0, homeName: "Geelong Grammar 1st XV", awayName: "Opposition", selectedGameId: firstXVGames[0]?.id || "", timerSeconds: 0, timerRunning: false },
      "2nd XV": { home: 0, away: 0, homeName: "Geelong Grammar 2nd XV", awayName: "Opposition", selectedGameId: secondXVGames[0]?.id || "", timerSeconds: 0, timerRunning: false },
      "U16":    { home: 0, away: 0, homeName: "Geelong Grammar U16",    awayName: "Opposition", selectedGameId: u16Games[0]?.id || "", timerSeconds: 0, timerRunning: false }
    };

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return structuredClone(defaultState);
      try {
        const parsed = JSON.parse(saved);
        for (const div of Object.keys(defaultState)) {
          if (!parsed[div]) parsed[div] = structuredClone(defaultState[div]);
          if (typeof parsed[div].timerSeconds !== "number") parsed[div].timerSeconds = 0;
          if (typeof parsed[div].timerRunning !== "boolean") parsed[div].timerRunning = false;
        }
        return parsed;
      } catch {
        return structuredClone(defaultState);
      }
    }

    let state = loadState();
    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function currentDivision(){ return divisionSelect.value; }

    // =========================
    // LIVE BADGE LOGIC
    // =========================
    let livePulseTimeout = null;

    function setLiveBadge(on, pulse){
      liveBadgeEl.classList.toggle("on", !!on);
      liveBadgeEl.classList.toggle("pulse", !!pulse);
    }

    function pulseLiveBadge(){
      setLiveBadge(true, true);
      clearTimeout(livePulseTimeout);
      livePulseTimeout = setTimeout(() => {
        // If timer is running, keep LIVE on (no pulse). Else hide.
        const div = currentDivision();
        if (state[div].timerRunning) setLiveBadge(true, false);
        else setLiveBadge(false, false);
      }, 3500);
    }

    // =========================
    // TIMER LOGIC
    // =========================
    function formatTime(sec){
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    function periodLabel(sec){
      const h = 35 * 60;
      const ft = 70 * 60;
      if (sec >= ft) return "FT";
      if (sec >= h) return "H2";
      return "H1";
    }

    function renderTimer(){
      const div = currentDivision();
      const d = state[div];
      timerDisplayEl.textContent = formatTime(d.timerSeconds);
      timerPeriodEl.textContent = periodLabel(d.timerSeconds);
      timerStartBtn.textContent = d.timerRunning ? "Pause" : "Start";

      // LIVE badge is on while timer running
      if (d.timerRunning) setLiveBadge(true, false);
      else {
        // keep badge only if pulsing due to a recent score change
        if (!liveBadgeEl.classList.contains("pulse")) setLiveBadge(false, false);
      }
    }

    // Global timer tick (only increments the currently selected division if running)
    setInterval(() => {
      const div = currentDivision();
      const d = state[div];
      if (d.timerRunning){
        d.timerSeconds += 1;
        saveState();
        renderTimer();
        // LIVE stays on while running
        setLiveBadge(true, false);
      }
    }, 1000);

    timerStartBtn.addEventListener("click", () => {
      const div = currentDivision();

      // Only one division timer should run at a time:
      for (const k of Object.keys(state)) state[k].timerRunning = false;

      state[div].timerRunning = !state[div].timerRunning;
      saveState();
      renderTimer();

      // show LIVE when starting
      if (state[div].timerRunning) setLiveBadge(true, false);
      else setLiveBadge(false, false);
    });

    timerResetBtn.addEventListener("click", () => {
      const div = currentDivision();
      state[div].timerSeconds = 0;
      state[div].timerRunning = false;
      saveState();
      renderTimer();
      setLiveBadge(false, false);
    });

    // =========================
    // RESULTS HELPERS (R3 + W/L/D + draw highlight + Geelong score highlight)
    // =========================
    function escapeHtml(s){
      return (s ?? "").toString().replace(/[<>&"]/g, c => ({
        "<":"&lt;", ">":"&gt;", "&":"&amp;", '"':"&quot;"
      }[c]));
    }

    function extractRoundCode(note){
      const m = /round\s*(\d+)/i.exec(note || "");
      return m ? `R${m[1]}` : "R?";
    }

    function extractNoteExtra(note){
      if (!note) return "";
      let extra = note.replace(/round\s*\d+/i, "").trim();
      extra = extra.replace(/^[\-\u2013•:()]+/g, "").trim();
      extra = extra.replace(/[()]+/g, "").trim();
      return extra;
    }

    function outcomeForGeelong(game){
      const homeIsGG = (game.home || "").toLowerCase().includes("geelong grammar");
      const awayIsGG = (game.away || "").toLowerCase().includes("geelong grammar");

      if (game.homeScore == null || game.awayScore == null) {
        return { code: "TBC", cls: "tbc", homeIsGG, awayIsGG };
      }

      const ggScore = homeIsGG ? game.homeScore : game.awayScore;
      const oppScore = homeIsGG ? game.awayScore : game.homeScore;

      if (ggScore === oppScore) return { code: "D", cls: "draw", homeIsGG, awayIsGG };
      return ggScore > oppScore ? { code: "W", cls: "win", homeIsGG, awayIsGG } : { code: "L", cls: "loss", homeIsGG, awayIsGG };
    }

    function logoHtml(teamName){
      const src = logoSrcFor(teamName);
      if (src){
        return `<span class="logoBadge"><img src="${src}" alt="${escapeHtml(teamName)} logo"></span>`;
      }
      return `<span class="logoBadge"><span class="initials">${initialsFor(teamName)}</span></span>`;
    }

    function scorePillHtml(g, homeIsGG, awayIsGG){
      const hs = (g.homeScore == null) ? "—" : String(g.homeScore);
      const as = (g.awayScore == null) ? "—" : String(g.awayScore);

      // If unknown score, still highlight Geelong side as bold
      const homeCls = homeIsGG ? "scorePart gg" : "scorePart";
      const awayCls = awayIsGG ? "scorePart gg" : "scorePart";

      return `
        <span class="${homeCls}">${escapeHtml(hs)}</span>
        <span class="dash">-</span>
        <span class="${awayCls}">${escapeHtml(as)}</span>
      `;
    }

    function renderResults(games){
      resultsGridEl.innerHTML = "";
      const sorted = [...games].sort((a,b) => (a.date < b.date ? 1 : -1));

      for (const g of sorted){
        const roundCode = extractRoundCode(g.note);
        const extra = extractNoteExtra(g.note);
        const outcome = outcomeForGeelong(g);

        const card = document.createElement("div");
        card.className = `resultCard ${outcome.cls}`;

        card.innerHTML = `
          <div class="meta">
            <span class="roundBadge">${escapeHtml(roundCode)}</span>
            <span class="outcomeBadge ${escapeHtml(outcome.cls)}">${escapeHtml(outcome.code)}</span>
            <span>${escapeHtml(g.dateLabel)} • ${escapeHtml(g.venue)}</span>
            ${extra ? `<span class="metaExtra">• ${escapeHtml(extra)}</span>` : ""}
          </div>

          <div class="divider"></div>

          <div class="matchRow">
            <div class="teamSide">
              ${logoHtml(g.home)}
              <div class="teamText" title="${escapeHtml(g.home)}">${escapeHtml(g.home)}</div>
            </div>

            <div class="scorePill">
              ${scorePillHtml(g, outcome.homeIsGG, outcome.awayIsGG)}
            </div>

            <div class="teamSide right">
              <div class="teamText" title="${escapeHtml(g.away)}">${escapeHtml(g.away)}</div>
              ${logoHtml(g.away)}
            </div>
          </div>
        `;
        resultsGridEl.appendChild(card);
      }
    }

    function updateResultsForDivision(div){
      if (div === "U16"){
        resultsTitleEl.textContent = "U16 — Previous Games (This Season)";
        resultsNoteEl.textContent  = "2026 VSRU — U16A Results";
        renderResults(manualPastU16);
      } else if (div === "2nd XV"){
        resultsTitleEl.textContent = "2nd XV — Previous Games (This Season)";
        resultsNoteEl.textContent  = "2026 VSRU — 2nd XV Results";
        renderResults(manualPast2ndXV);
      } else {
        resultsTitleEl.textContent = "1st XV — Previous Games (This Season)";
        resultsNoteEl.textContent  = "2026 VSRU — 1st XV Results";
        renderResults(manualPast1stXV);
      }
    }

    // =========================
    // SCOREBOARD + FIXTURE PICKERS
    // =========================
    function populatePicker(selectEl, games){
      selectEl.innerHTML = "";
      for (const g of games){
        const opt = document.createElement("option");
        opt.value = g.id;
        opt.textContent = g.label;
        selectEl.appendChild(opt);
      }
    }

    function applyFixtureToDivision(divKey, games, selectedId){
      const game = games.find(g => g.id === selectedId) || games[0];
      if (!game) return;

      state[divKey].selectedGameId = game.id;
      state[divKey].homeName = game.home;
      state[divKey].awayName = game.away;
      saveState();

      if (currentDivision() === divKey) render();
    }

    function updateTeamBadges(){
      setLogoBadge(homeLogoBadge, homeNameEl.value);
      setLogoBadge(awayLogoBadge, awayNameEl.value);
    }

    function render() {
      const div = currentDivision();
      const d = state[div];

      homeScoreEl.innerText = d.home;
      awayScoreEl.innerText = d.away;
      homeNameEl.value = d.homeName;
      awayNameEl.value = d.awayName;

      if (div === "1st XV"){
        gamePicker1st.style.display = "inline-block";
        gamePicker2nd.style.display = "none";
        gamePickerU16.style.display = "none";
        gamePicker1st.value = d.selectedGameId || (firstXVGames[0]?.id || "");
      } else if (div === "2nd XV"){
        gamePicker1st.style.display = "none";
        gamePicker2nd.style.display = "inline-block";
        gamePickerU16.style.display = "none";
        gamePicker2nd.value = d.selectedGameId || (secondXVGames[0]?.id || "");
      } else {
        gamePicker1st.style.display = "none";
        gamePicker2nd.style.display = "none";
        gamePickerU16.style.display = "inline-block";
        gamePickerU16.value = d.selectedGameId || (u16Games[0]?.id || "");
      }

      updateTeamBadges();
      updateResultsForDivision(div);
      renderTimer();
    }

    homeNameEl.addEventListener("input", () => {
      const div = currentDivision();
      state[div].homeName = homeNameEl.value || "Home";
      saveState();
      updateTeamBadges();
    });

    awayNameEl.addEventListener("input", () => {
      const div = currentDivision();
      state[div].awayName = awayNameEl.value || "Away";
      saveState();
      updateTeamBadges();
    });

    divisionSelect.addEventListener("change", () => {
      // stop any running timer when switching divisions to avoid confusion
      for (const k of Object.keys(state)) state[k].timerRunning = false;
      saveState();
      setLiveBadge(false, false);
      render();
    });

    function addPoints(side, points) {
      const div = currentDivision();
      const d = state[div];
      d[side] = d[side] + points;
      if (d[side] < 0) d[side] = 0;
      saveState();
      render();
      // LIVE pulses when a score changes
      pulseLiveBadge();
    }

    function resetCurrentDivision() {
      const div = currentDivision();
      const keepSelected = state[div].selectedGameId;
      const keepNames = { homeName: state[div].homeName, awayName: state[div].awayName };
      state[div] = structuredClone(defaultState[div]);
      state[div].selectedGameId = keepSelected;
      state[div].homeName = keepNames.homeName;
      state[div].awayName = keepNames.awayName;
      saveState();
      render();
      pulseLiveBadge();
    }

    function resetEverything() {
      state = structuredClone(defaultState);
      saveState();
      setLiveBadge(false, false);
      render();
    }

    gamePicker1st.addEventListener("change", () => {
      applyFixtureToDivision("1st XV", firstXVGames, gamePicker1st.value);
      pulseLiveBadge();
    });
    gamePicker2nd.addEventListener("change", () => {
      applyFixtureToDivision("2nd XV", secondXVGames, gamePicker2nd.value);
      pulseLiveBadge();
    });
    gamePickerU16.addEventListener("change", () => {
      applyFixtureToDivision("U16", u16Games, gamePickerU16.value);
      pulseLiveBadge();
    });

    // =========================
    // INITIAL LOAD
    // =========================
    populatePicker(gamePicker1st, firstXVGames);
    populatePicker(gamePicker2nd, secondXVGames);
    populatePicker(gamePickerU16, u16Games);

    applyFixtureToDivision("1st XV", firstXVGames, state["1st XV"].selectedGameId);
    applyFixtureToDivision("2nd XV", secondXVGames, state["2nd XV"].selectedGameId);
    applyFixtureToDivision("U16", u16Games, state["U16"].selectedGameId);

    render();
  </script>

</body>
</html>
