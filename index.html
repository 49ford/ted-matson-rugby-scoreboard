<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ted Matson Rugby Scoreboard</title>

<style>
:root{
  --bg:#0a1f33; --panel:#102a44; --card:#163a5f;
  --accent:#c9a24d; --danger:#8b1e2d;
  --text:#fff; --outline:rgba(255,255,255,.14);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;text-align:center}
header{background:var(--panel);padding:16px;border-bottom:1px solid var(--outline)}
h1{margin:0;font-size:28px}
.topbar{margin:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button,select,input{
  font-size:16px;padding:10px;border-radius:10px;
  border:1px solid var(--outline);background:#163a5f;color:#fff
}
button:disabled{opacity:.5}
.scoreboard{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.team{background:var(--card);padding:16px;border-radius:14px;width:300px}
.score{font-size:72px;font-weight:900}
.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.add{background:var(--accent);color:#000}
.sub{background:var(--danger)}
.last{font-size:12px;opacity:.7;margin-top:6px}
.admin{font-size:12px;font-weight:bold}
</style>
</head>

<body>

<header>
  <h1>Ted Matson Rugby Scoreboard</h1>
  <div class="admin" id="adminStatus">Spectator mode</div>
</header>

<div class="topbar">
  <select id="division">
    <option>1st XV</option>
    <option>2nd XV</option>
    <option>U16</option>
  </select>

  <button id="adminBtn">Admin unlock</button>
  <button id="lockBtn" style="display:none">Lock</button>
</div>

<div class="scoreboard">
  <div class="team">
    <input id="homeName">
    <div class="score" id="homeScore">0</div>
    <div class="btnrow">
      <button class="add" onclick="add('home',5)">+5</button>
      <button class="add" onclick="add('home',3)">+3</button>
      <button class="sub" onclick="add('home',-1)">-1</button>
      <button class="sub" onclick="add('home',-5)">-5</button>
    </div>
  </div>

  <div class="team">
    <input id="awayName">
    <div class="score" id="awayScore">0</div>
    <div class="btnrow">
      <button class="add" onclick="add('away',5)">+5</button>
      <button class="add" onclick="add('away',3)">+3</button>
      <button class="sub" onclick="add('away',-1)">-1</button>
      <button class="sub" onclick="add('away',-5)">-5</button>
    </div>
  </div>
</div>

<div class="last" id="lastUpdated">Connecting…</div>

<script>
/* ===== CONFIG ===== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwHZsj2Yssiizo36MNnwCOR-0t8Ug1mUjaB74-xGal5nEuXmjNgdZvV0aEvIqZxjJ5Z/exec";
const POLL_MS = 3000;

/* ===== STATE ===== */
let state = null;
let admin = false;
let pin = null;
let writing = false;
let pendingAt = 0;

/* ===== ELEMENTS ===== */
const homeScore = document.getElementById("homeScore");
const awayScore = document.getElementById("awayScore");
const homeName  = document.getElementById("homeName");
const awayName  = document.getElementById("awayName");
const division  = document.getElementById("division");
const adminBtn  = document.getElementById("adminBtn");
const lockBtn   = document.getElementById("lockBtn");
const statusEl  = document.getElementById("adminStatus");
const lastEl    = document.getElementById("lastUpdated");

/* ===== JSONP GET ===== */
function fetchState(){
  return new Promise((resolve)=>{
    const cb = "__cb"+Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    window[cb] = data => {
      delete window[cb];
      s.remove();
      accept(data);
      resolve();
    };
    s.src = GAS_URL + "?callback=" + cb + "&_=" + Date.now();
    document.body.appendChild(s);
  });
}

/* ===== ACCEPT SERVER STATE ===== */
function accept(data){
  if(!data) return;
  const ts = data.updatedAtMs || 0;
  if(writing && ts < pendingAt) return;
  state = data;
  writing = false;
  render();
}

/* ===== POST ===== */
function push(){
  if(!admin || !state) return;
  writing = true;
  pendingAt = Date.now();
  state.updatedAtMs = pendingAt;

  fetch(GAS_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({pin,division:division.value,state})
  });
}

/* ===== RENDER ===== */
function render(){
  if(!state) return;
  const d = state.divisions[division.value];
  homeScore.textContent = d.home;
  awayScore.textContent = d.away;
  homeName.value = d.homeName;
  awayName.value = d.awayName;
  lastEl.textContent = "Last updated: " + new Date(state.updatedAtMs).toLocaleTimeString();
}

/* ===== ACTIONS ===== */
function add(side,val){
  if(!admin || !state) return;
  const d = state.divisions[division.value];
  d[side] = Math.max(0, d[side] + val);
  push();
  render();
}

/* ===== ADMIN ===== */
adminBtn.onclick = ()=>{
  const p = prompt("Enter admin PIN");
  if(!p) return;
  pin = p;
  admin = true;
  adminBtn.style.display="none";
  lockBtn.style.display="inline-block";
  statusEl.textContent="Admin mode";
};

lockBtn.onclick = ()=>{
  admin=false; pin=null;
  adminBtn.style.display="inline-block";
  lockBtn.style.display="none";
  statusEl.textContent="Spectator mode";
};

/* ===== INIT ===== */
fetchState();
setInterval(fetchState,POLL_MS);
</script>
</body>
</html>
