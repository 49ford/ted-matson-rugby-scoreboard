<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ted Matson Rugby Scoreboard</title>

  <style>
    :root{
      --bg:#0a1f33; --panel:#102a44; --card:#163a5f;
      --accent:#c9a24d; --danger:#8b1e2d;
      --text:#fff; --muted:rgba(255,255,255,.72); --outline:rgba(255,255,255,.14);
      --admin: rgba(201,162,77,0.20);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;text-align:center}
    header{background:var(--panel);padding:18px 14px;border-bottom:1px solid var(--outline)}
    h1{margin:0;font-size:32px;line-height:1.1}
    .sub{margin-top:6px;font-size:14px;color:var(--muted)}
    .topbar{margin:12px auto 0;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:0 10px;align-items:center}
    select,.smallbtn,input{
      font-size:16px;padding:10px 12px;border-radius:10px;border:1px solid var(--outline);
      outline:none;background:rgba(255,255,255,.06);color:#fff
    }
    select{min-width:240px}
    .smallbtn{cursor:pointer;font-weight:800}
    .smallbtn.danger{background:rgba(139,30,45,.95);border-color:rgba(255,255,255,.12)}
    .adminChip{
      display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid rgba(201,162,77,.35);
      background:var(--admin);border-radius:999px;font-weight:900;letter-spacing:.4px;color:#ffe6ad;font-size:12px;text-transform:uppercase;user-select:none
    }
    .adminChip.locked{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:rgba(255,255,255,.75)}

    .divisionTabs{display:none;width:100%;max-width:520px;padding:0 10px;margin:12px auto 0}
    .tabsInner{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid rgba(255,255,255,.16);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.06)}
    .tabBtn{border:none;background:transparent;color:rgba(255,255,255,.85);padding:12px 10px;font-weight:900;cursor:pointer;font-size:14px}
    .tabBtn.active{background:rgba(201,162,77,.22);color:#ffe6ad}

    .matchHud{margin:12px auto 0;padding:0 10px;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap}
    .timerWrap{display:inline-flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--outline);border-radius:12px;background:rgba(255,255,255,.06);user-select:none}
    .timerDisplay{font-weight:900;letter-spacing:1px;font-size:18px;min-width:92px;text-align:center}
    .timerPeriod{font-size:12px;font-weight:900;letter-spacing:1px;padding:4px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08)}
    .timerBtn{font-size:14px;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-weight:900}
    .timerBtn.primary{background:rgba(201,162,77,.20);border-color:rgba(201,162,77,.35);color:#ffe6ad}
    .timerBtn.danger{background:rgba(139,30,45,.22);border-color:rgba(139,30,45,.35);color:#ffd1d8}

    .lastUpdated{font-size:12px;margin:6px auto 4px;color:rgba(255,255,255,.70)}
    .nowPlaying{max-width:1060px;margin:8px auto 6px;padding:8px 12px;font-size:13px;font-weight:800;text-align:center;color:rgba(255,255,255,.9);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:999px}
    .nowPlaying .npDot{margin:0 6px;opacity:.6}

    .scoreboard{display:flex;justify-content:center;gap:18px;margin:14px auto 0;padding:10px;flex-wrap:wrap;max-width:1060px;position:sticky;top:0;z-index:5;background:var(--bg);box-shadow:0 10px 25px rgba(0,0,0,.22);border-bottom:1px solid var(--outline)}
    .team{background:var(--card);padding:20px;border-radius:14px;width:330px;box-shadow:0 10px 25px rgba(0,0,0,.25);border:1px solid var(--outline)}
    .label{font-size:12px;letter-spacing:1px;text-transform:uppercase;opacity:.85;margin-top:6px}
    .teamname{display:flex;justify-content:center;gap:10px;align-items:center;flex-wrap:wrap;margin-top:6px}
    .teamname input{width:240px;text-align:center;background:rgba(255,255,255,.10)}
    .score{font-size:86px;margin:12px 0 16px;font-weight:900}
    .btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    button.scoreBtn{font-size:18px;padding:12px 10px;border:1px solid rgba(255,255,255,.10);border-radius:8px;cursor:pointer;font-weight:900;color:#fff;background:rgba(255,255,255,.06)}
    .add{background:var(--accent);color:#0a1f33}
    .subtract{background:var(--danger);color:#fff}

    .footer{margin:18px 0 24px;font-size:13px;opacity:.78}
    .versionStamp{display:block;margin-top:6px;font-size:11px;opacity:.65;letter-spacing:.4px}

    @media (max-width:480px){
      #divisionSelect{display:none}
      .divisionTabs{display:block}
      .team{width:100%}
      .score{font-size:72px}
      .scoreboard{position:static;box-shadow:none;border-bottom:none}
    }
  </style>
</head>

<body>
  <header>
    <h1>Ted Matson Rugby Scoreboard</h1>
    <div class="sub">Multi-Division: 1st XV • 2nd XV • U16</div>
  </header>

  <div class="divisionTabs" aria-label="Division tabs">
    <div class="tabsInner">
      <button class="tabBtn" type="button" data-div="1st XV">1st XV</button>
      <button class="tabBtn" type="button" data-div="2nd XV">2nd XV</button>
      <button class="tabBtn" type="button" data-div="U16">U16</button>
    </div>
  </div>

  <div class="topbar">
    <select id="divisionSelect" aria-label="Select division">
      <option>1st XV</option>
      <option>2nd XV</option>
      <option>U16</option>
    </select>

    <button class="smallbtn" id="adminUnlockBtn" type="button">🔒 Admin unlock</button>
    <button class="smallbtn danger" id="adminLockBtn" type="button" style="display:none;">Lock</button>
    <span id="adminChip" class="adminChip locked">Locked</span>
  </div>

  <div class="matchHud">
    <div class="timerWrap" id="timerWrap" aria-label="Match timer">
      <span id="timerPeriod" class="timerPeriod">H1</span>
      <span id="timerDisplay" class="timerDisplay">00:00</span>
      <button class="timerBtn primary" id="timerStartBtn" type="button">Start</button>
      <button class="timerBtn danger" id="timerResetBtn" type="button">Reset</button>
    </div>
  </div>

  <div class="lastUpdated" id="lastUpdated">Connecting…</div>

  <div class="nowPlaying" aria-label="Now playing">
    <span id="npDivision">1st XV</span><span class="npDot">•</span>
    <span id="npFixture">Home vs Away</span><span class="npDot">•</span>
    <span id="npVenue">Venue</span>
  </div>

  <div class="scoreboard">
    <div class="team">
      <div class="label">Home</div>
      <div class="teamname">
        <input id="homeName" type="text" value="Home" />
      </div>
      <div id="homeScore" class="score">0</div>
      <div class="btnrow">
        <button class="scoreBtn add" id="btnHomeTry">+5 Try</button>
        <button class="scoreBtn add" id="btnHomePen">+3 Penalty</button>
        <button class="scoreBtn subtract" id="btnHomeMinus1">-1</button>
        <button class="scoreBtn subtract" id="btnHomeMinus5">-5</button>
      </div>
    </div>

    <div class="team">
      <div class="label">Away</div>
      <div class="teamname">
        <input id="awayName" type="text" value="Away" />
      </div>
      <div id="awayScore" class="score">0</div>
      <div class="btnrow">
        <button class="scoreBtn add" id="btnAwayTry">+5 Try</button>
        <button class="scoreBtn add" id="btnAwayPen">+3 Penalty</button>
        <button class="scoreBtn subtract" id="btnAwayMinus1">-1</button>
        <button class="scoreBtn subtract" id="btnAwayMinus5">-5</button>
      </div>
    </div>
  </div>

  <div class="footer">
    Live match scoreboard • View‑only for spectators • Updates by match officials
    <span class="versionStamp">v2.2 – Sheets Sync (stable)</span>
  </div>

<script>
/* ===== CONFIG ===== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwHZsj2Yssiizo36MNnwCOR-0t8Ug1mUjaB74-xGal5nEuXmjNgdZvV0aEvIqZxjJ5Z/exec";
const POLL_MS = 3000;

/* ===== UI ===== */
const $ = (id) => document.getElementById(id);
const divisionSelect = $("divisionSelect");
const tabButtons = Array.from(document.querySelectorAll(".tabBtn"));

const adminUnlockBtn = $("adminUnlockBtn");
const adminLockBtn = $("adminLockBtn");
const adminChipEl = $("adminChip");

const timerDisplayEl = $("timerDisplay");
const timerPeriodEl  = $("timerPeriod");
const timerStartBtn  = $("timerStartBtn");
const timerResetBtn  = $("timerResetBtn");

const homeNameEl = $("homeName");
const awayNameEl = $("awayName");
const homeScoreEl = $("homeScore");
const awayScoreEl = $("awayScore");

const npDivisionEl = $("npDivision");
const npFixtureEl  = $("npFixture");
const npVenueEl    = $("npVenue");

const lastUpdatedEl = $("lastUpdated");

const scoreBtns = {
  btnHomeTry: $("btnHomeTry"),
  btnHomePen: $("btnHomePen"),
  btnHomeMinus1: $("btnHomeMinus1"),
  btnHomeMinus5: $("btnHomeMinus5"),
  btnAwayTry: $("btnAwayTry"),
  btnAwayPen: $("btnAwayPen"),
  btnAwayMinus1: $("btnAwayMinus1"),
  btnAwayMinus5: $("btnAwayMinus5")
};

function currentDivision(){ return divisionSelect.value; }

/* ===== SESSION ===== */
let adminUnlocked = false;
let adminPin = null;

/* ===== REMOTE STATE ===== */
let remoteState = null;

/* Anti-revert guard */
let writeInFlight = false;
let pendingWriteAtMs = 0;

/* ===== TIMER (no drift) ===== */
function computeSeconds(d){
  const base = d.timerBaseSeconds || 0;
  if (!d.timerRunning) return base;
  const started = d.timerStartedAtMs || 0;
  return base + Math.max(0, Math.floor((Date.now() - started)/1000));
}
function formatTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}
function periodLabel(sec){
  const h=35*60, ft=70*60;
  if (sec>=ft) return "FT";
  if (sec>=h) return "H2";
  return "H1";
}

/* ===== JSONP GET ===== */
function fetchState(){
  return new Promise((resolve, reject) => {
    const cb = "__sb_cb_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");

    window[cb] = (data) => {
      try {
        acceptServerState(data);
        resolve(data);
      } catch (e) {
        reject(e);
      } finally {
        delete window[cb];
        script.remove();
      }
    };

    // IMPORTANT: real & characters, not &amp;
    script.src = GAS_URL + "?callback=" + cb + "&_=" + Date.now();
    script.onerror = () => {
      delete window[cb];
      script.remove();
      reject(new Error("JSONP load failed"));
    };

    document.body.appendChild(script);
  });
}

function acceptServerState(data){
  if (!data || !data.divisions) return;
  const incoming = data.updatedAtMs || 0;

  // while pending write, ignore older snapshots
  if (writeInFlight && incoming < pendingWriteAtMs) return;

  remoteState = data;

  // if caught up, release
  if (writeInFlight && incoming >= pendingWriteAtMs){
    writeInFlight = false;
    pendingWriteAtMs = 0;
  }

  render();
}

/* ===== POST write (no-cors) ===== */
function pushState(div){
  if (!adminUnlocked || !adminPin || !remoteState) return;

  const payload = { pin: adminPin, division: div, state: remoteState };

  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });

  // safety release
  setTimeout(() => { writeInFlight = false; pendingWriteAtMs = 0; }, 2000);
}

/* ===== RENDER ===== */
function render(){
  if (!remoteState || !remoteState.divisions) return;

  const div = currentDivision();
  const d = remoteState.divisions[div];

  homeScoreEl.textContent = d.home ?? 0;
  awayScoreEl.textContent = d.away ?? 0;

  if (document.activeElement !== homeNameEl) homeNameEl.value = d.homeName || "Home";
  if (document.activeElement !== awayNameEl) awayNameEl.value = d.awayName || "Away";

  const sec = computeSeconds(d);
  timerDisplayEl.textContent = formatTime(sec);
  timerPeriodEl.textContent  = periodLabel(sec);

  npDivisionEl.textContent = div;
  npFixtureEl.textContent  = (d.homeName || "Home") + " vs " + (d.awayName || "Away");
  npVenueEl.textContent    = d.venue || "Venue";

  lastUpdatedEl.textContent = remoteState.updatedAtMs
    ? ("Last updated: " + new Date(remoteState.updatedAtMs).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}))
    : "Connecting…";

  applyAdminUI();
}

function applyAdminUI(){
  adminUnlockBtn.style.display = adminUnlocked ? "none" : "inline-block";
  adminLockBtn.style.display   = adminUnlocked ? "inline-block" : "none";
  adminChipEl.textContent = adminUnlocked ? "Admin" : "Locked";
  adminChipEl.classList.toggle("locked", !adminUnlocked);

  // DO NOT disable buttons based on remoteState; iPhone taps fail on disabled elements
  const editable = adminUnlocked;

  timerStartBtn.disabled = !editable;
  timerResetBtn.disabled = !editable;
  homeNameEl.disabled = !editable;
  awayNameEl.disabled = !editable;

  Object.values(scoreBtns).forEach(b => b.disabled = !editable);
}

/* ===== Admin actions ===== */
function requireAdmin(){
  if (!adminUnlocked){ alert("Admin unlock required"); return false; }
  if (!remoteState){ alert("Still connecting… try again in 2–3 seconds."); return false; }
  return true;
}

function commitLocalChange(div){
  if (!remoteState) return;
  remoteState.updatedAtMs = Date.now();
  pendingWriteAtMs = remoteState.updatedAtMs;
  writeInFlight = true;
  render();
  pushState(div);
}

function addPoints(side, delta){
  if (!requireAdmin()) return;
  const div = currentDivision();
  const d = remoteState.divisions[div];
  d[side] = Math.max(0, (d[side]||0) + delta);
  commitLocalChange(div);
}

function toggleTimer(){
  if (!requireAdmin()) return;
  const div = currentDivision();
  const d = remoteState.divisions[div];
  const now = Date.now();

  if (!d.timerRunning){
    d.timerRunning = true;
    d.timerStartedAtMs = now;
  } else {
    const elapsed = Math.max(0, Math.floor((now - (d.timerStartedAtMs||now))/1000));
    d.timerBaseSeconds = (d.timerBaseSeconds||0) + elapsed;
    d.timerRunning = false;
    d.timerStartedAtMs = 0;
  }
  commitLocalChange(div);
}

function resetTimer(){
  if (!requireAdmin()) return;
  const div = currentDivision();
  const d = remoteState.divisions[div];
  d.timerBaseSeconds = 0;
  d.timerRunning = false;
  d.timerStartedAtMs = 0;
  commitLocalChange(div);
}

/* ===== Wire UI ===== */
adminUnlockBtn.addEventListener("click", () => {
  const entered = prompt("Enter 4-digit admin PIN:");
  if (!entered) return;
  adminPin = entered.trim();
  adminUnlocked = true;
  applyAdminUI();
});

adminLockBtn.addEventListener("click", () => {
  adminUnlocked = false;
  adminPin = null;
  applyAdminUI();
});

timerStartBtn.addEventListener("click", toggleTimer);
timerResetBtn.addEventListener("click", resetTimer);

scoreBtns.btnHomeTry.addEventListener("click", () => addPoints("home", 5));
scoreBtns.btnHomePen.addEventListener("click", () => addPoints("home", 3));
scoreBtns.btnHomeMinus1.addEventListener("click", () => addPoints("home", -1));
scoreBtns.btnHomeMinus5.addEventListener("click", () => addPoints("home", -5));

scoreBtns.btnAwayTry.addEventListener("click", () => addPoints("away", 5));
scoreBtns.btnAwayPen.addEventListener("click", () => addPoints("away", 3));
scoreBtns.btnAwayMinus1.addEventListener("click", () => addPoints("away", -1));
scoreBtns.btnAwayMinus5.addEventListener("click", () => addPoints("away", -5));

homeNameEl.addEventListener("input", () => {
  if (!requireAdmin()) return;
  const div = currentDivision();
  remoteState.divisions[div].homeName = homeNameEl.value || "Home";
  commitLocalChange(div);
});
awayNameEl.addEventListener("input", () => {
  if (!requireAdmin()) return;
  const div = currentDivision();
  remoteState.divisions[div].awayName = awayNameEl.value || "Away";
  commitLocalChange(div);
});

divisionSelect.addEventListener("change", render);

tabButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    divisionSelect.value = btn.dataset.div;
    tabButtons.forEach(b => b.classList.toggle("active", b === btn));
    render();
  });
});

/* ===== Init ===== */
(async function init(){
  tabButtons.forEach(b => b.classList.toggle("active", b.dataset.div === currentDivision()));
  try { await fetchState(); } catch(e) {}
  setInterval(() => { fetchState().catch(()=>{}); }, POLL_MS);
  setInterval(() => { if (remoteState) render(); }, 1000);
})();
</script>
</body>
</html>
